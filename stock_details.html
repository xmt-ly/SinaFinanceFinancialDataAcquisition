<div class="hq_details has_limit" id="hq">
<div class="price_time">
<div class="price clearfix" id="trading">
<div class="change">
<div class="@UD_change@" id="change">@change@</div>
<div class="@UD_change@" id="changeP">@changeP@</div>
</div>
<div class="arrow arrow_@UD_change@" id="arrow"></div>
<div class="@UD_change@" id="price">@now@</div>
<div class="ud_limit" id="ud_limie">
<div>涨停：@up_limit@</div>
<div>跌停：@down_limit@</div>
</div>
</div>
<div class="price" id="closed">
                            停牌
                        </div>
<div class="time" id="hqTime">
                            @date@ @time@
                        </div>
<div class="time blue_l" id="hqPause">临时停牌</div>
</div>
<div class="other" id="hqDetails">
<table border="0" cellpadding="0" cellspacing="0">
<colgroup>
<col width="60"/>
<col width="50"/>
<col width="60"/>
<col width="70"/>
<col width="70"/>
<col width="40"/>
</colgroup>
<tbody>
<tr>
<th>今  开：</th>
<td class="@UD_open_color@">@open@</td>
<th>成交量：</th>
<td>@volume@</td>
<th>振  幅：</th>
<td>@swing@</td>
</tr>
<tr>
<th>最  高：</th>
<td class="@UD_high_color@">@high@</td>
<th>成交额：</th>
<td>@amount@</td>
<th>换手率：</th>
<td>@turnover@</td>
</tr>
<tr>
<th>最  低：</th>
<td class="@UD_low_color@">@low@</td>
<th>总市值：</th>
<!--                                <td>@totalShare@</td>-->
<td>@fixTotalShare@</td>
<th>市净率：</th>
<td>@pb@</td>
</tr>
<tr>
<th>昨  收：</th>
<td>@preClose@</td>
<th>流通值：</th>
<td>@cvs@</td>
<th>市盈率<sup>TTM</sup>：</th>
<td>@pe@</td>
</tr>
<tr>
<th>总股本：</th>
<td>@zgb@</td>
<th>流通股：</th>
<td>@ltgb@</td>
</tr>
</tbody>
</table>
</div>
</div>
